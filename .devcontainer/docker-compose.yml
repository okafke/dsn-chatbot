services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      # Backend settings for local development
      DATABASE_URL: postgresql+asyncpg://chatbot:chatbot@db:5432/chatbot
      JWT_SECRET_KEY: dev-secret-key-not-for-production
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      CORS_ORIGINS: "http://localhost:5173,http://localhost:8000,http://localhost"
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  pgdata:
